<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Gems of Light — Al-Kawthar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Scheherazade+New&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; height: 100%; background: #243626; overflow: hidden;
      -webkit-user-select: none; user-select: none; }
    #game { display: block; width: 100vw; height: 100vh; touch-action: none; }
    #hint { position: fixed; bottom: 14px; width: 100%; text-align: center;
      font: 600 15px Nunito, system-ui; color: rgba(255,251,238,0.75); pointer-events: none;
      transition: opacity 1s; }

    /* ---- rotate-your-device screen (touch devices in portrait) ---- */
    #rotate { display: none; position: fixed; inset: 0; z-index: 30;
      background: #2E4032; color: #F5EDD4; flex-direction: column;
      align-items: center; justify-content: center; gap: 22px; text-align: center;
      font: 700 20px Nunito, system-ui; }
    #rotate svg { width: 110px; height: 110px; animation: tilt 2.2s ease-in-out infinite; }
    @keyframes tilt {
      0%, 20% { transform: rotate(0deg); }
      55%, 80% { transform: rotate(-90deg); }
      100% { transform: rotate(-90deg); }
    }
    @media (pointer: coarse) and (orientation: portrait) {
      #rotate { display: flex; }
    }

    /* ---- touch controls (tablets & phones only) ---- */
    #controls { display: none; position: fixed; inset: 0; z-index: 20; pointer-events: none; }
    @media (pointer: coarse) { #controls { display: block; } #hint { display: none; } }
    .padBtn { position: fixed; pointer-events: auto; touch-action: none;
      width: 108px; height: 108px; border-radius: 50%;
      background: rgba(250,244,224,0.28); border: 3px solid rgba(250,244,224,0.55);
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; }
    .padBtn:active, .padBtn.on { background: rgba(250,244,224,0.55); }
    .padBtn svg { width: 44px; height: 44px; fill: rgba(62,83,64,0.85); }
    #btnL { left: 22px;  bottom: 24px; }
    #btnR { left: 150px; bottom: 24px; }
    #btnJ { right: 26px; bottom: 24px; width: 128px; height: 128px;
      border-color: rgba(240,200,120,0.7); }
    #btnJ svg { width: 54px; height: 54px; fill: rgba(122,98,56,0.9); }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hint">← → walk · space / tap right side to jump</div>

  <div id="rotate">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <rect x="7" y="2" width="10" height="20" rx="2.4" fill="none"
        stroke="#F5EDD4" stroke-width="1.6"/>
      <circle cx="12" cy="19" r="1" fill="#F5EDD4"/>
      <path d="M20.5 8.5 a8.5 8.5 0 0 0 -4.2 -4.9" fill="none"
        stroke="#F0C878" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M20.9 4.7 L20.5 8.7 L16.6 7.8" fill="none"
        stroke="#F0C878" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>turn your device sideways<br/><span style="font-weight:600; font-size:15px; opacity:0.75">the garden is wide, like a meadow</span></div>
  </div>

  <div id="controls">
    <div class="padBtn" id="btnL" aria-label="walk left">
      <svg viewBox="0 0 24 24"><path d="M15.5 4.5 L8 12 L15.5 19.5 L15.5 15.5 L11.8 12 L15.5 8.5 Z"/></svg>
    </div>
    <div class="padBtn" id="btnR" aria-label="walk right">
      <svg viewBox="0 0 24 24"><path d="M8.5 4.5 L16 12 L8.5 19.5 L8.5 15.5 L12.2 12 L8.5 8.5 Z"/></svg>
    </div>
    <div class="padBtn" id="btnJ" aria-label="jump">
      <svg viewBox="0 0 24 24"><path d="M12 3.5 L18.5 10.5 L14.5 10.5 L14.5 20 L9.5 20 L9.5 10.5 L5.5 10.5 Z"/></svg>
    </div>
  </div>
  <script src="js/kawthar.js"></script>
  <script>
    const cv = document.getElementById('game');
    const ctx = cv.getContext('2d');
    const K = window.KAWTHAR;
    const S = K.state;
    // iOS only counts a gesture toward "audio may play" if something is
    // actually played synchronously inside it — attach this as early and
    // as broadly as possible, before assets even finish loading.
    for (const ev of ['pointerdown', 'touchend', 'mousedown', 'keydown']) {
      document.addEventListener(ev, () => K.unlockAudio(), { passive: true });
    }
    const load = (src) => new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = src; });
    (async () => {
      const img = {};
      await Promise.all(Object.entries(K.FILES).map(async ([k, f]) => (img[k] = await load(f))));
      // optional paintings: use them if they exist, placeholders otherwise
      await Promise.all(Object.entries(K.OPTIONAL).map(async ([k, f]) => {
        try { img[k] = await load(f); } catch (e) { img[k] = null; }
      }));
      const fit = () => {
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        cv.width = innerWidth * dpr; cv.height = innerHeight * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        K.init(img, innerWidth, innerHeight);
      };
      fit(); addEventListener('resize', fit);
      addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') S.input.left = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') S.input.right = true;
        if (e.code === 'Space' || e.code === 'ArrowUp') S.input.jump = true;
      });
      addEventListener('keyup', (e) => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') S.input.left = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') S.input.right = false;
        if (e.code === 'Space' || e.code === 'ArrowUp') S.input.jump = false;
      });
      const toWorld = (e) => ({ x: e.clientX / (S.scale || 1) + S.camX, y: e.clientY / (S.scale || 1) });
      cv.addEventListener('pointerdown', (e) => {
        if (S.mode === 'done') { location.reload(); return; }
        if (S.mode === 'order') { const w = toWorld(e); S.drag = w; K.pointerDown(w.x, w.y); return; }
        if (e.clientX < innerWidth * 0.18) S.input.left = true;
        else if (e.clientX < innerWidth * 0.36) S.input.right = true;
        else S.input.jump = true;
      });
      cv.addEventListener('pointermove', (e) => { if (S.mode === 'order') S.drag = toWorld(e); });
      cv.addEventListener('pointerup', (e) => {
        if (S.mode === 'order') { const w = toWorld(e); K.pointerUp(w.x, w.y); S.drag = null; return; }
        S.input.left = S.input.right = S.input.jump = false;
      });
      setTimeout(() => (document.getElementById('hint').style.opacity = 0), 9000);

      // big tap-target movement buttons (visible on coarse pointers via CSS)
      const bindPad = (id, key) => {
        const el = document.getElementById(id);
        const on = (e) => { e.preventDefault(); S.input[key] = true; el.classList.add('on'); };
        const off = () => { S.input[key] = false; el.classList.remove('on'); };
        el.addEventListener('pointerdown', on);
        for (const ev of ['pointerup', 'pointercancel', 'pointerleave']) el.addEventListener(ev, off);
      };
      bindPad('btnL', 'left');
      bindPad('btnR', 'right');
      bindPad('btnJ', 'jump');
      const controls = document.getElementById('controls');

      const portrait = () => matchMedia('(pointer: coarse) and (orientation: portrait)').matches;
      let last = performance.now();
      const loop = (now) => {
        const dt = Math.min(0.033, (now - last) / 1000); last = now;
        // the walking pad only belongs to the walking part of the journey
        controls.style.display = S.mode === 'play' ? '' : 'none';
        if (!portrait()) {                    // rest quietly behind the rotate screen
          K.tick(dt);
          K.draw(ctx, (w, h) => { const c = document.createElement('canvas'); c.width = w; c.height = h; return c; });
        }
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
