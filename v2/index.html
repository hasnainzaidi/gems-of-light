<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Gems of Light</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="A gentle platformer where children collect glowing gems — each one an ayah — and arrange them into a complete surah." />

  <!-- Open Graph / link previews — same image as the root site, so the
       iMessage/social preview matches whether someone shares the root
       domain or a /v2 link. -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.playgemsoflight.com/v2/" />
  <meta property="og:title" content="Gems of Light — A Quran Adventure" />
  <meta property="og:description" content="Collect glowing gems, each one an ayah, and piece together a surah in this gentle platformer for kids." />
  <meta property="og:image" content="https://www.playgemsoflight.com/assets/share-preview.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter/X card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Gems of Light — A Quran Adventure" />
  <meta name="twitter:description" content="Collect glowing gems, each one an ayah, and piece together a surah in this gentle platformer for kids." />
  <meta name="twitter:image" content="https://www.playgemsoflight.com/assets/share-preview.jpg" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gems of Light" />
  <meta name="theme-color" content="#2E4032" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet" />
  <!-- Two gardens are open now, so the old straight-to-Kawthar redirect
       became this little gate: pick a surah, walk in. The full multi-level
       prototype still lives, untouched, at index-full.html. -->
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #2E4032;
      overflow: hidden;
      font-family: Nunito, "Trebuchet MS", system-ui, sans-serif;
    }
    #bg {
      position: fixed; inset: 0;
      background: url('assets/key-art.jpg') center / cover no-repeat;
      filter: saturate(0.94);
    }
    #bg::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg,
        rgba(30,43,34,0.55) 0%, rgba(30,43,34,0.32) 40%, rgba(30,43,34,0.62) 100%);
    }
    main {
      position: relative; z-index: 1;
      height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: clamp(14px, 3vmin, 26px);
      padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
               max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }
    h1 {
      margin: 0;
      color: #F5EDD4;
      font-weight: 800;
      font-size: clamp(26px, 6vmin, 44px);
      letter-spacing: 0.5px;
      text-shadow: 0 2px 14px rgba(20,30,22,0.65);
    }
    h1 .gem { color: #F0C878; }
    p.tag {
      margin: -6px 0 4px;
      color: rgba(245,237,212,0.82);
      font-weight: 600;
      font-size: clamp(13px, 2.6vmin, 16px);
      text-align: center;
      text-shadow: 0 1px 8px rgba(20,30,22,0.6);
    }
    #cards {
      display: flex; gap: clamp(12px, 2.6vmin, 22px);
      flex-wrap: wrap; justify-content: center;
      max-width: 900px;
    }
    a.card {
      display: block;
      width: clamp(240px, 38vmin, 330px);
      text-decoration: none;
      background: linear-gradient(180deg, rgba(250,244,224,0.96), rgba(242,231,200,0.96));
      border: 2px solid rgba(200,155,85,0.85);
      border-radius: 22px;
      padding: 18px 20px 16px;
      box-shadow: 0 8px 26px rgba(20,30,22,0.45);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    a.card:hover, a.card:focus-visible { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(20,30,22,0.5); }
    a.card:active { transform: translateY(0); }
    .ar {
      font-family: "Scheherazade New", "Geeza Pro", serif;
      font-size: clamp(30px, 6vmin, 40px);
      color: #2E4032;
      text-align: center;
      line-height: 1.25;
    }
    .en {
      margin-top: 2px;
      font-weight: 800; font-size: clamp(17px, 3.2vmin, 20px);
      color: #3E5340; text-align: center;
    }
    .blurb {
      margin-top: 8px;
      font-weight: 600; font-size: clamp(12.5px, 2.4vmin, 14px);
      color: #6B7D66; text-align: center; line-height: 1.45;
    }
    .gems {
      margin-top: 10px;
      display: flex; justify-content: center; gap: 7px;
    }
    .gems i {
      width: 11px; height: 16px; display: inline-block;
      clip-path: polygon(50% 0, 100% 28%, 100% 72%, 50% 100%, 0 72%, 0 28%);
      box-shadow: inset 0 0 4px rgba(255,255,255,0.5);
    }
    footer {
      position: fixed; z-index: 1;
      bottom: max(10px, env(safe-area-inset-bottom));
      width: 100%;
      text-align: center;
      color: rgba(245,237,212,0.55);
      font-weight: 600; font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="bg" aria-hidden="true"></div>
  <main>
    <h1>Gems of Light <span class="gem">✦</span></h1>
    <p class="tag">pick a surah — walk the garden, gather its ayahs, hear it whole</p>
    <div id="cards">
      <a class="card" href="kawthar.html">
        <div class="ar">الكوثر</div>
        <div class="en">Al-Kawthar</div>
        <div class="blurb">The garden of abundance — three gems by the spring and the falls.</div>
        <div class="gems">
          <i style="background:#7fbf6f"></i><i style="background:#63b287"></i><i style="background:#8fbf5f"></i>
        </div>
      </a>
      <a class="card" href="falaq.html">
        <div class="ar">الفلق</div>
        <div class="en">Al-Falaq</div>
        <div class="blurb">Daybreak Hollow — five gems on the walk out of the dark into the light.</div>
        <div class="gems">
          <i style="background:#e3b34f"></i><i style="background:#63b287"></i><i style="background:#5f6fd0"></i><i style="background:#a06fd0"></i><i style="background:#d76f8f"></i>
        </div>
      </a>
    </div>
  </main>
  <footer>recitation: Mishary Rashid Alafasy</footer>
  <script>
    if ('serviceWorker' in navigator && /^https?:$/.test(location.protocol)) {
      addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
          .then((reg) => { reg.update().catch(() => {}); })
          .catch(() => {});
      });
    }
  </script>
</body>
</html>
