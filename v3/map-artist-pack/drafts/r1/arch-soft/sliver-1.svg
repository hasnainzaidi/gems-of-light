  <!-- retaining wall face (all round; near side shows) -->
  <path transform="translate(0,22)" fill="#CBBC97" d="M 205,175 C 210,120 265,85 340,78 C 420,70 505,72 570,92 C 635,112 668,160 662,205 C 656,252 610,290 540,305 C 465,322 360,320 290,300 C 228,282 200,230 205,175 Z"/>
  <rect x="332" y="312" width="6" height="17" rx="3" fill="#B9A87C" opacity="0.55"/>
  <rect x="398" y="320" width="6" height="17" rx="3" fill="#B9A87C" opacity="0.55"/>
  <rect x="468" y="315" width="6" height="17" rx="3" fill="#B9A87C" opacity="0.55"/>
  <rect x="533" y="306" width="6" height="17" rx="3" fill="#B9A87C" opacity="0.55"/>
  <rect x="597" y="286" width="6" height="16" rx="3" fill="#B9A87C" opacity="0.5"/>

  <!-- wall top rim -->
  <path fill="#EAE0C6" d="M 205,175 C 210,120 265,85 340,78 C 420,70 505,72 570,92 C 635,112 668,160 662,205 C 656,252 610,290 540,305 C 465,322 360,320 290,300 C 228,282 200,230 205,175 Z"/>

  <!-- terrace grass, inset within the wall -->
  <path transform="translate(26.1,11.8) scale(0.94)" fill="url(#grassTop)" d="M 205,175 C 210,120 265,85 340,78 C 420,70 505,72 570,92 C 635,112 668,160 662,205 C 656,252 610,290 540,305 C 465,322 360,320 290,300 C 228,282 200,230 205,175 Z"/>
  <ellipse cx="330" cy="138" rx="112" ry="52" fill="#ACDE90" opacity="0.45"/>
