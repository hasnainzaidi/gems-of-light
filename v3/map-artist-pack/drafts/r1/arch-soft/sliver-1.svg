    <g transform="scale(0.82)">
      <polygon points="54,0 38.2,15.8 38.2,38.2 15.8,38.2 0,54 -15.8,38.2 -38.2,38.2 -38.2,15.8 -54,0 -38.2,-15.8 -38.2,-38.2 -15.8,-38.2 0,-54 15.8,-38.2 38.2,-38.2 38.2,-15.8" fill="#CBBC97" stroke="#CBBC97" stroke-width="9" stroke-linejoin="round"/>
    </g>
    <g transform="scale(0.70)">
