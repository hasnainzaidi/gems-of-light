<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="plain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#BCD8B2"/>
      <stop offset="1" stop-color="#93C08D"/>
    </linearGradient>
    <linearGradient id="grassTop" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#84C471"/>
      <stop offset="1" stop-color="#74B863"/>
    </linearGradient>
  </defs>

  <!-- calm open plain -->
