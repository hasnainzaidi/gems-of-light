  <ellipse cx="130" cy="345" rx="100" ry="26" fill="#F4EFD8" opacity="0.14"/>
  <ellipse cx="795" cy="110" rx="85" ry="22" fill="#F4EFD8" opacity="0.11"/>
  <ellipse cx="760" cy="360" rx="70" ry="18" fill="#F4EFD8" opacity="0.09"/>

