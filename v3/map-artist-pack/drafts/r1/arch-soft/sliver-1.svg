    <path d="M 654,200 C 690,220 722,240 752,262" fill="none" stroke="#EAE0C6" stroke-width="40" stroke-linecap="round"/>
    <path d="M 648,197 C 690,220 722,240 752,262" fill="none" stroke="#57A79E" stroke-width="14" stroke-linecap="round"/>
    <path transform="translate(0,3)" d="M 648,197 C 690,220 722,240 752,262" fill="none" stroke="#8FCFC2" stroke-width="10" stroke-linecap="round"/>
    <rect x="657" y="203" width="24" height="6" rx="3" fill="#BFE8DC" transform="rotate(6 669 206)"/>
    <rect x="685" y="221" width="24" height="6" rx="3" fill="#BFE8DC" transform="rotate(12 697 224)"/>
    <rect x="713" y="241" width="24" height="6" rx="3" fill="#BFE8DC" transform="rotate(18 725 244)"/>

    <path transform="translate(0,7)" d="M 748,258 C 778,264 800,266 818,266" fill="none" stroke="#CBBC97" stroke-width="24" stroke-linecap="round"/>
    <path d="M 748,258 C 778,264 800,266 818,266" fill="none" stroke="#EAE0C6" stroke-width="24" stroke-linecap="round"/>
    <path d="M 748,258 C 778,264 800,266 816,266" fill="none" stroke="#57A79E" stroke-width="11" stroke-linecap="round"/>
    <path transform="translate(0,2.5)" d="M 748,258 C 778,264 800,266 816,266" fill="none" stroke="#8FCFC2" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- orchard tree 1, planted in a cut bed (north-east) -->
  <g>
    <ellipse cx="472" cy="130" rx="30" ry="14" fill="#CBBC97"/>
    <ellipse cx="472" cy="129" rx="24" ry="10" fill="#C4A981"/>
    <ellipse cx="480" cy="132" rx="26" ry="9" fill="#5B9C52" opacity="0.28"/>
    <rect x="468" y="104" width="8" height="26" rx="4" fill="#8A6B4F"/>
    <circle cx="475" cy="94" r="30" fill="#5B9C52"/>
    <circle cx="470" cy="89" r="27" fill="#7CBF6B"/>
    <ellipse cx="461" cy="81" rx="14" ry="10" fill="#ACDE90"/>
