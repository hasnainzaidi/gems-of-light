  <!-- orchard tree 2, planted in a cut bed (west) -->
  <g>
    <ellipse cx="262" cy="224" rx="33" ry="15" fill="#CBBC97"/>
    <ellipse cx="262" cy="223" rx="27" ry="11" fill="#C4A981"/>
    <ellipse cx="271" cy="226" rx="28" ry="10" fill="#5B9C52" opacity="0.28"/>
    <rect x="258" y="192" width="8" height="32" rx="4" fill="#8A6B4F"/>
    <circle cx="266" cy="182" r="34" fill="#5B9C52"/>
    <circle cx="260" cy="176" r="30" fill="#7CBF6B"/>
    <ellipse cx="250" cy="167" rx="15" ry="11" fill="#ACDE90"/>
  </g>

