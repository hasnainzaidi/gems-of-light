  <path d="M 289,289 C 305,255 318,238 348,232 C 390,224 430,238 470,242 C 520,247 570,236 612,220" fill="none" stroke="#E7DDC0" stroke-width="20" stroke-linecap="round"/>
  <ellipse cx="316" cy="248" rx="7" ry="4.5" fill="#D6C9A2"/>
  <ellipse cx="352" cy="233" rx="7" ry="4.5" fill="#D6C9A2"/>
  <ellipse cx="398" cy="228" rx="7" ry="4.5" fill="#D6C9A2"/>
  <ellipse cx="446" cy="239" rx="7" ry="4.5" fill="#D6C9A2"/>
  <ellipse cx="494" cy="245" rx="7" ry="4.5" fill="#D6C9A2"/>
