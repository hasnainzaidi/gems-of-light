  <g>
    <path d="M 277,292 L 277,272 C 277,258 301,258 301,272 L 301,292" fill="none" stroke="#8A6B4F" stroke-width="7" stroke-linecap="round"/>
    <path d="M 280,271 C 282,264 296,264 298,271" fill="none" stroke="#A5825F" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="289" cy="293" rx="15" ry="4" fill="#5B9C52" opacity="0.3"/>
  </g>
</svg>
