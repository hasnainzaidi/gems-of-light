<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>r4 sliver — A2 / A</title>
<style>
  body { margin: 0; padding: 18px 14px 60px; background: #1b1c20; color: #cfcabc;
         font: 15px/1.4 -apple-system, sans-serif; }
  h1 { font-size: 16px; font-weight: 600; color: #9a958a; margin: 0 0 18px; }
  h2 { font-size: 22px; font-weight: 700; margin: 30px 0 10px; color: #e8e2d2; }
  .cap { font-size: 12px; color: #7f7b70; margin: 4px 0 10px; }
  img { display: block; max-width: 100%; border-radius: 6px; }
  .frame { max-width: 852px; aspect-ratio: 852 / 393; overflow: hidden;
           position: relative; border-radius: 6px; }
  .frame img { position: absolute; top: 50%; left: 0; width: 100%;
               transform: translateY(-50%); border-radius: 0; }
</style>
</head>
<body>
<h1>Round 4 style sliver — A2 refinement (A kept below for comparison)</h1>

<h2>A2</h2>
<div class="cap">full tile</div>
<img src="sliver-A2.png" alt="">
<div class="cap">phone framing (852&times;393)</div>
<div class="frame"><img src="sliver-A2.png" alt=""></div>

<h2>A</h2>
<div class="cap">full tile</div>
<img src="sliver-A.png" alt="">
<div class="cap">phone framing (852&times;393)</div>
<div class="frame"><img src="sliver-A.png" alt=""></div>
</body>
</html>
