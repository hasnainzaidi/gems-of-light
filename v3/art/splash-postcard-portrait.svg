<svg viewBox="0 0 900 1600" width="900" height="1600" xmlns="http://www.w3.org/2000/svg">
<!-- The splash postcard, PORTRAIT recomposition — same scene and same
     gouache language as splash-postcard.svg (the lightling beside the
     valley spring), rearranged for a phone held upright: this is the
     title page a child meets before rotating into landscape.
     Safe area: the story lives inside x 80..820, y 180..1400 (iPhone
     and iPad portrait cover-crops both keep that zone). The canvas
     letters the title around y 300-430 of this art — keep it clear. -->
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#9ED2C6"/>
    <stop offset="0.55" stop-color="#DFF0C8"/>
    <stop offset="1" stop-color="#FBE7AE"/>
  </linearGradient>
  <linearGradient id="lawn" x1="0" y1="0" x2="0.2" y2="1">
    <stop offset="0" stop-color="#A8DA8C"/>
    <stop offset="1" stop-color="#6FAF60"/>
  </linearGradient>
  <linearGradient id="fore" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#68A868"/>
    <stop offset="1" stop-color="#4E8746"/>
  </linearGradient>
  <radialGradient id="moonHalo">
    <stop offset="0" stop-color="#FDF4D8" stop-opacity="0.6"/>
    <stop offset="1" stop-color="#FDF4D8" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="warm">
    <stop offset="0" stop-color="#FBE7AE" stop-opacity="0.5"/>
    <stop offset="1" stop-color="#FBE7AE" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="halo">
    <stop offset="0" stop-color="#FFF3C4" stop-opacity="0.5"/>
    <stop offset="0.55" stop-color="#FFF3C4" stop-opacity="0.16"/>
    <stop offset="1" stop-color="#FFF3C4" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="body" cx="0.58" cy="0.3" r="0.95">
    <stop offset="0" stop-color="#FFFBEA"/>
    <stop offset="0.55" stop-color="#FFF1CC"/>
    <stop offset="1" stop-color="#F3D492"/>
  </radialGradient>
  <radialGradient id="tintTeal">
    <stop offset="0" stop-color="#9ED2C6" stop-opacity="0.2"/>
    <stop offset="1" stop-color="#9ED2C6" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="tintHoney">
    <stop offset="0" stop-color="#F6CE92" stop-opacity="0.3"/>
    <stop offset="1" stop-color="#F6CE92" stop-opacity="0"/>
  </radialGradient>

  <!-- a memory bloom (the map's pink five-petal flower) -->
  <g id="bloom">
    <path d="M0,10 Q1,2 0,-3" fill="none" stroke="#6DA84E" stroke-width="2.6" stroke-linecap="round"/>
    <g transform="translate(0,-10)">
      <ellipse cx="0" cy="-6.6" rx="4.4" ry="6.2" fill="#EFC3CC"/>
      <ellipse cx="0" cy="-6.6" rx="4.4" ry="6.2" fill="#EFC3CC" transform="rotate(72)"/>
      <ellipse cx="0" cy="-6.6" rx="4.4" ry="6.2" fill="#F2CFD8" transform="rotate(144)"/>
      <ellipse cx="0" cy="-6.6" rx="4.4" ry="6.2" fill="#EFC3CC" transform="rotate(216)"/>
      <ellipse cx="0" cy="-6.6" rx="4.4" ry="6.2" fill="#F2CFD8" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="3.4" fill="#F6D68C"/>
    </g>
  </g>

  <!-- an orchard tree, the map's blob-canopy hand -->
  <g id="tree">
    <ellipse cx="0" cy="4" rx="52" ry="12" fill="#4E8746" opacity="0.22"/>
    <rect x="-8" y="-66" width="16" height="72" rx="7" fill="#8A6B4F"/>
    <circle cx="-38" cy="-84" r="40" fill="#5E8A50"/>
    <circle cx="40" cy="-86" r="42" fill="#6FAA58"/>
    <circle cx="0" cy="-116" r="52" fill="#6FAA58"/>
    <circle cx="-16" cy="-126" r="36" fill="#98CB77"/>
    <circle cx="34" cy="-104" r="26" fill="#98CB77"/>
    <circle cx="-30" cy="-70" r="9" fill="#F4CD7E"/>
    <circle cx="22" cy="-128" r="8" fill="#F4CD7E"/>
    <circle cx="48" cy="-78" r="8" fill="#F4CD7E"/>
    <circle cx="-4" cy="-96" r="7" fill="#F6D68C"/>
  </g>

  <!-- a grass tuft -->
  <g id="tuft" fill="none" stroke-linecap="round">
    <path d="M-8,0 Q-9,-10 -12,-16" stroke="#5B9C52" stroke-width="3"/>
    <path d="M-2,0 Q-2,-13 -4,-21" stroke="#5B9C52" stroke-width="3"/>
    <path d="M3,0 Q4,-12 7,-18" stroke="#6FAD72" stroke-width="3"/>
    <path d="M8,0 Q10,-8 13,-13" stroke="#6FAD72" stroke-width="3"/>
  </g>

  <!-- a little light-sparkle -->
  <path id="spark" d="M0,-15 C2,-4 4,-2 13,0 C4,2 2,4 0,15 C-2,4 -4,2 -13,0 C-4,-2 -2,-4 0,-15 Z" fill="#FFF6DC"/>

  <!-- a drifting petal -->
  <ellipse id="petal" cx="0" cy="0" rx="7" ry="4" fill="#F2CFD8"/>
</defs>

<!-- ============================== sky ============================== -->
<rect x="0" y="0" width="900" height="740" fill="url(#sky)"/>

