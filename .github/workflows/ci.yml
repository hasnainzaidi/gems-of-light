name: CI

# Runs on every pull request. This repo is a vanilla-JS static site with no
# bundler and no root package.json — the "tests" are hand-rolled Node checker
# scripts that exit non-zero on failure. The steps below reflect that reality:
# lint = syntax-check all JS; test = run the checker scripts; type-check and
# build are not applicable (no TypeScript, no build step) and are kept as
# informational no-ops so the pipeline structure is explicit.

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # No root package.json / lockfile exists, so there are no npm
          # dependencies to install or cache. setup-node's cache is
          # intentionally omitted; the Node toolchain itself is cached by the
          # action. If a root package.json with a lockfile is ever added,
          # add `cache: npm` here.

      - name: Lint (JS syntax check)
        # No ESLint is configured in this repo. `node --check` is the honest
        # lint equivalent: it parses every source file and fails on syntax
        # errors. Excludes vendored/third-party dirs.
        run: |
          set -e
          files=$(find . \
            -type f \( -name '*.js' -o -name '*.mjs' \) \
            -not -path './node_modules/*' \
            -not -path './v2/node_modules/*' \
            -not -path './.git/*')
          echo "Checking $(echo "$files" | wc -l) JS files..."
          for f in $files; do
            node --check "$f"
          done
          echo "All JS files parsed cleanly."

      - name: Type-check
        # Not applicable: this repo is plain browser JavaScript with no
        # TypeScript and no tsconfig. Kept as an explicit, passing no-op.
        run: echo "No TypeScript in this repo — type-check not applicable."

      - name: Test (level integrity + progression checks)
        # These scripts process.exit(1) on failure, so a red step = a real
        # regression (unreachable gem, broken shrine lock, entry-parity drift).
        run: |
          set -e
          node v3/tools/check.mjs
          node v3/tools/check-entry-parity.mjs
          node v3/tools/test-parent-opened-progression.mjs
          node v3/tools/test-shrine-recitation-lock.mjs
          node tools/check-levels.mjs

      - name: Build
        # Not applicable: the site is served as static files directly (see
        # .github/workflows/pages.yml, which uploads the repo as-is). There is
        # no compile/bundle step. Kept as an explicit, passing no-op.
        run: echo "Static site — no build step. Deployment is handled by pages.yml on push to main."
